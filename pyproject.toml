# Workspace root — virtual project (not an installable package).
# All Python dependency management uses UV exclusively.

[tool.uv.workspace]
members = ["backend", "agents", "shared", "evaluation", "tools"]

# ── Workspace-level dev dependencies ─────────────────────────────────────
[dependency-groups]
dev = [
    "black>=24.4",
    "isort>=5.13",
    "ruff>=0.5",
    "mypy>=1.11",
    "pre-commit>=3.7",
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
]

# ── black ─────────────────────────────────────────────────────────────────
[tool.black]
line-length = 120
target-version = ["py312"]

# ── isort ────────────────────────────────────────────────────────────────
[tool.isort]
profile = "black"
line_length = 120

# ── ruff ────────────────────────────────────────────────────────────────
[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "C4", "ANN"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"*/tests/*" = ["ANN"]

# ── mypy ────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
strict = true
exclude = [
    "infra/",
    "frontend/",
    "scripts/",
    "docs/",
]
# Allow Pydantic v2 dynamic attrs
plugins = ["pydantic.mypy"]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

# ── pytest ───────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = [
    "backend/tests",
    "agents/tests",
    "shared/tests",
    "evaluation/tests",
    "tools/tests",
]
pythonpath = [
    "backend/src",
    "agents/src",
    "shared/src",
    "evaluation/src",
    "tools/src",
]
asyncio_mode = "auto"
