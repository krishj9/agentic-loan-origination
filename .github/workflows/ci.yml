name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: lint + type-check + test ─────────────────────────────────────
  python-lint-test:
    name: "Python — lint, typecheck, test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install all workspace dependencies
        run: uv sync --all-packages --all-groups

      - name: Check formatting (black)
        run: uv run black --check .

      - name: Check import ordering (isort)
        run: uv run isort --check-only .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: |
          uv run mypy \
            shared/src \
            backend/src \
            agents/src \
            evaluation/src

      - name: Run tests (pytest)
        run: uv run pytest --tb=short -q

  # ── Frontend: lint + build ────────────────────────────────────────────────
  frontend-lint-build:
    name: "Frontend — lint, build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Build
        run: npm run build

  # ── Terraform: fmt + validate + tflint ───────────────────────────────────
  terraform-validate:
    name: "Terraform — fmt, validate, tflint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      # Cache downloaded provider plugins to speed up init.
      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            infra/envs/demo/.terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('infra/envs/demo/versions.tf') }}
          restore-keys: terraform-${{ runner.os }}-

      - name: Set Terraform plugin cache dir
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir = "$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      # ── Formatting check ──────────────────────────────────────────────────
      - name: Terraform format check
        working-directory: infra
        run: terraform fmt -check -recursive

      # ── Init (no backend — CI does not have state bucket access) ──────────
      - name: Terraform init (no backend)
        working-directory: infra/envs/demo
        run: terraform init -backend=false -input=false

      # ── Validate ──────────────────────────────────────────────────────────
      - name: Terraform validate
        working-directory: infra/envs/demo
        run: terraform validate

      # ── tflint ────────────────────────────────────────────────────────────
      - name: Install tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: "v0.54.0"

      - name: tflint — init (download AWS ruleset)
        working-directory: infra
        run: tflint --init

      - name: tflint — recursive lint
        working-directory: infra
        run: tflint --recursive --config .tflint.hcl

  # ── Pre-commit: all hooks ────────────────────────────────────────────────
  pre-commit:
    name: "Pre-commit hooks"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install pre-commit
        run: uv run pre-commit install-hooks

      - name: Run all pre-commit hooks
        run: uv run pre-commit run --all-files
        env:
          # Prevent detect-secrets from treating example values as real secrets.
          DETECT_SECRETS_BASELINE: .secrets.baseline
